version: "3.8"

services:
  selenoid:
    image: aerokube/selenoid:1.11.2
    container_name: selenoid
    ports:
      - "4444:4444"
    volumes:
      - ./selenoid:/etc/selenoid
      - /var/run/docker.sock:/var/run/docker.sock
      - ./target/selenoid-video:/opt/selenoid/video
      - ./target/selenoid-logs:/opt/selenoid/logs
    environment:
      - OVERRIDE_VIDEO_OUTPUT_DIR=${PWD}/target/selenoid-video
    command:
      - "-conf"
      - "/etc/selenoid/browsers.json"
      - "-video-output-dir"
      - "/opt/selenoid/video"
      - "-log-output-dir"
      - "/opt/selenoid/logs"
      - "-limit"
      - "4"

  selenoid-ui:
    image: aerokube/selenoid-ui:1.10.11
    container_name: selenoid-ui
    ports:
      - "8080:8080"
    depends_on:
      - selenoid
    command:
      - "--selenoid-uri"
      - "http://selenoid:4444"

networks:
  default:
    name: selenoid-network
