stages:
  - build
  - test-api
  - test-ui
  - test-bdd
  - report

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  BASE_URL: "http://localhost:3000"
  SELENOID_URL: "http://selenoid:4444/wd/hub"

cache:
  paths:
    - .m2/repository/

# ---------------------------------------------------------------------------
# Build & resolve dependencies
# ---------------------------------------------------------------------------
build:
  stage: build
  image: maven:3.9-eclipse-temurin-17
  script:
    - cd qa-java
    - mvn clean compile -DskipTests
  artifacts:
    paths:
      - qa-java/target/
    expire_in: 1 hour

# ---------------------------------------------------------------------------
# API Tests (no browser needed)
# ---------------------------------------------------------------------------
api-tests:
  stage: test-api
  image: maven:3.9-eclipse-temurin-17
  needs: ["build"]
  script:
    - cd qa-java
    - mvn test -Papi -Dbase.url=$BASE_URL
  artifacts:
    when: always
    paths:
      - qa-java/target/allure-results/
      - qa-java/target/surefire-reports/
    expire_in: 7 days
  allow_failure: false

# ---------------------------------------------------------------------------
# UI Tests (Selenoid)
# ---------------------------------------------------------------------------
ui-tests:
  stage: test-ui
  image: maven:3.9-eclipse-temurin-17
  needs: ["build"]
  services:
    - name: aerokube/selenoid:1.11.2
      alias: selenoid
      command:
        - "-limit"
        - "4"
  script:
    - cd qa-java
    - >
      mvn test -Pui
      -Dbase.url=$BASE_URL
      -Dselenoid.enabled=true
      -Dselenoid.url=$SELENOID_URL
      -Dbrowser.headless=true
  artifacts:
    when: always
    paths:
      - qa-java/target/allure-results/
      - qa-java/target/selenoid-video/
    expire_in: 7 days
  allow_failure: true

# ---------------------------------------------------------------------------
# BDD Tests (Cucumber)
# ---------------------------------------------------------------------------
bdd-tests:
  stage: test-bdd
  image: maven:3.9-eclipse-temurin-17
  needs: ["build"]
  services:
    - name: aerokube/selenoid:1.11.2
      alias: selenoid
  script:
    - cd qa-java
    - >
      mvn test -Pbdd
      -Dbase.url=$BASE_URL
      -Dselenoid.enabled=true
      -Dselenoid.url=$SELENOID_URL
  artifacts:
    when: always
    paths:
      - qa-java/target/allure-results/
      - qa-java/target/cucumber-reports/
    expire_in: 7 days
  allow_failure: true

# ---------------------------------------------------------------------------
# Allure Report
# ---------------------------------------------------------------------------
allure-report:
  stage: report
  image: frankescobar/allure-docker-service:2.17.2
  needs:
    - job: api-tests
      artifacts: true
    - job: ui-tests
      artifacts: true
    - job: bdd-tests
      artifacts: true
  script:
    - allure generate qa-java/target/allure-results -o qa-java/target/allure-report --clean
  artifacts:
    paths:
      - qa-java/target/allure-report/
    expire_in: 30 days
  when: always
