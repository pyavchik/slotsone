# SlotsOne QA — environment configuration
# Override via system properties or env vars: -Dbase.url=https://pyavchik.space

base.url=http://localhost:3000
api.base.path=/api/v1

# Test credentials
test.user.email=testuser@slotsone.com
test.user.password=TestPass123!

# Selenoid (remote WebDriver)
selenoid.enabled=false
selenoid.url=http://localhost:4444/wd/hub
selenoid.video.enabled=true
selenoid.vnc.enabled=true

# Browser
browser=chrome
browser.size=1920x1080
browser.headless=true

# Timeouts (ms)
timeout.default=10000
timeout.api=5000

# Allure
allure.results.directory=target/allure-results
