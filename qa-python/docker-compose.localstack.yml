name: qa-python-aws

services:
  localstack:
    image: localstack/localstack:3
    container_name: qa-python-localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3,sqs,logs
      DEBUG: "0"
      PERSISTENCE: "0"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health | grep -q '\"s3\": \"available\"'"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
