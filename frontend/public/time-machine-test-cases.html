<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pyavchik Time Machine — Test Cases</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(180deg, #0f1118 0%, #0b0d13 100%);
        color: #f8fafc;
        min-height: 100vh;
        font-size: 14px;
      }

      .wrap {
        max-width: 1080px;
        margin: 0 auto;
        padding: 28px 18px 56px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      /* ── Cards ───────────────────────────────────── */
      .card {
        border: 1px solid rgba(255,255,255,0.13);
        border-radius: 14px;
        background: rgba(17,20,30,0.78);
        padding: 20px 22px;
      }

      h1 { margin: 0 0 3px; font-size: 26px; letter-spacing: -.3px; }
      .subtitle { margin: 0 0 14px; color: #94a3b8; font-size: 13px; }
      h2 { margin: 0 0 14px; font-size: 16px; color: #f1f5f9; }
      p  { margin: 0 0 10px; color: #dbe2ec; line-height: 1.55; }

      /* ── Back link ───────────────────────────────── */
      .back {
        display: inline-flex; align-items: center; gap: 6px;
        font-size: 13px; font-weight: 600; color: #94a3b8;
        text-decoration: none;
        border: 1px solid rgba(148,163,184,.3);
        padding: 6px 12px; border-radius: 8px;
        background: rgba(15,23,42,.5);
        width: fit-content;
      }
      .back:hover { color: #f8fafc; border-color: rgba(148,163,184,.7); }

      /* ── Stats ───────────────────────────────────── */
      .stats { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
      .stat {
        padding: 8px 14px; border-radius: 10px;
        background: rgba(15,23,42,.65);
        border: 1px solid rgba(148,163,184,.2);
        font-size: 13px; color: #dbe2ec; text-align: center;
      }
      .stat strong { display: block; font-size: 22px; line-height: 1.15; color: #f8fafc; }

      /* ── Controls ────────────────────────────────── */
      .controls { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }

      .filter-tabs { display: flex; flex-wrap: wrap; gap: 6px; flex: 1; }
      .tab {
        padding: 6px 14px; border-radius: 999px;
        border: 1px solid rgba(148,163,184,.3);
        background: transparent; color: #94a3b8;
        font-size: 12px; font-weight: 700; cursor: pointer;
        transition: border-color .15s, color .15s, background .15s;
        white-space: nowrap;
      }
      .tab:hover { border-color: rgba(248,250,252,.5); color: #f8fafc; }
      .tab.active {
        border-color: rgba(248,250,252,.7); color: #f8fafc;
        background: rgba(248,250,252,.08);
      }

      .search-wrap { position: relative; }
      .search-wrap svg {
        position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
        color: #64748b; pointer-events: none;
      }
      #search {
        padding: 7px 10px 7px 32px; border-radius: 8px;
        border: 1px solid rgba(148,163,184,.3);
        background: rgba(15,23,42,.65); color: #f8fafc;
        font-size: 13px; width: 220px; outline: none;
      }
      #search:focus { border-color: rgba(148,163,184,.7); }
      #search::placeholder { color: #475569; }

      .count-label { font-size: 12px; color: #475569; white-space: nowrap; }

      /* ── Badges ──────────────────────────────────── */
      .badge {
        display: inline-block; padding: 2px 7px;
        border-radius: 5px; font-size: 11px; font-weight: 700;
        white-space: nowrap; letter-spacing: .02em;
      }
      .badge-core   { background: rgba(245,208,106,.15); color: #f5d06a; }
      .badge-rewind { background: rgba(244,114,182,.15); color: #f472b6; }
      .badge-math   { background: rgba(251,146,60,.15);  color: #fb923c; }
      .badge-ui     { background: rgba(167,139,250,.18); color: #a78bfa; }
      .badge-api    { background: rgba(62,224,169,.15);  color: #3ee0a9; }
      .badge-nfr    { background: rgba(248,113,113,.15); color: #f87171; }

      .prio { font-size: 11px; font-weight: 800; white-space: nowrap; }
      .prio-HIGH { color: #f87171; }
      .prio-MED  { color: #fbbf24; }
      .prio-LOW  { color: #64748b; }

      .status-badge {
        padding: 2px 8px; border-radius: 5px; font-size: 11px; font-weight: 700; white-space: nowrap;
      }
      .status-not-run { background: rgba(100,116,139,.2); color: #94a3b8; }
      .status-pass    { background: rgba(34,197,94,.15);  color: #4ade80; }
      .status-fail    { background: rgba(248,113,113,.15);color: #f87171; }
      .status-blocked { background: rgba(251,191,36,.15); color: #fbbf24; }

      /* ── Table ───────────────────────────────────── */
      .tc-table { width: 100%; border-collapse: collapse; }

      .tc-table thead th {
        text-align: left; padding: 9px 12px;
        color: #64748b; font-size: 11px; font-weight: 700;
        text-transform: uppercase; letter-spacing: .07em;
        border-bottom: 1px solid rgba(255,255,255,.1);
      }

      .tc-row {
        cursor: pointer;
        transition: background .1s;
      }
      .tc-row:hover td { background: rgba(255,255,255,.04); }
      .tc-row td {
        padding: 10px 12px;
        border-bottom: 1px solid rgba(255,255,255,.06);
        vertical-align: middle;
        color: #dbe2ec;
      }
      .tc-row.open td { border-bottom: none; }

      .tc-id {
        font-family: ui-monospace, monospace; font-size: 12px;
        color: #62d7ff; white-space: nowrap;
      }
      .tc-title { color: #f1f5f9; line-height: 1.4; }
      .tc-chevron {
        transition: transform .2s; color: #475569;
        display: inline-block;
      }
      .tc-row.open .tc-chevron { transform: rotate(90deg); }

      /* ── Detail panel ────────────────────────────── */
      .tc-detail-row td {
        padding: 0;
        border-bottom: 1px solid rgba(255,255,255,.08);
      }
      .tc-detail-panel {
        display: none;
        padding: 0 12px 18px 48px;
        background: rgba(11,13,19,.6);
      }
      .tc-detail-panel.open { display: block; }

      .detail-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-top: 14px;
      }
      .detail-grid .full { grid-column: 1 / -1; }

      .detail-field { display: flex; flex-direction: column; gap: 5px; }
      .detail-label {
        font-size: 10px; font-weight: 700; text-transform: uppercase;
        letter-spacing: .08em; color: #64748b;
      }
      .detail-value {
        color: #dbe2ec; line-height: 1.5; font-size: 13px;
        padding: 8px 10px; border-radius: 8px;
        background: rgba(15,23,42,.55);
        border: 1px solid rgba(148,163,184,.12);
      }
      .detail-value.none { color: #475569; font-style: italic; }
      .detail-value code {
        font-family: ui-monospace, monospace;
        font-size: 12px; color: #a78bfa;
        background: rgba(167,139,250,.1);
        padding: 1px 4px; border-radius: 3px;
      }

      .steps-list {
        margin: 0; padding: 0; list-style: none;
        display: flex; flex-direction: column; gap: 5px;
      }
      .steps-list li {
        display: flex; gap: 8px; align-items: flex-start;
        font-size: 13px; color: #dbe2ec; line-height: 1.5;
      }
      .step-num {
        min-width: 20px; height: 20px; border-radius: 999px;
        background: rgba(98,215,255,.15); color: #62d7ff;
        font-size: 10px; font-weight: 800;
        display: flex; align-items: center; justify-content: center;
        margin-top: 1px; flex-shrink: 0;
      }

      .actual-placeholder { color: #475569; font-style: italic; }

      /* ── Empty state ─────────────────────────────── */
      .empty-row td {
        padding: 40px 12px; text-align: center;
        color: #475569; font-style: italic;
        border-bottom: none;
      }

      /* ── Legend ──────────────────────────────────── */
      .legend {
        display: flex; flex-wrap: wrap; gap: 10px;
        align-items: center; font-size: 12px; color: #64748b;
      }
      .legend-sep { width: 1px; height: 14px; background: rgba(255,255,255,.1); }

      /* ── Responsive ──────────────────────────────── */
      @media (max-width: 700px) {
        .wrap { padding: 14px 12px 40px; }
        .card { padding: 16px; }
        .detail-grid { grid-template-columns: 1fr; }
        .detail-grid .full { grid-column: auto; }
        .tc-detail-panel { padding-left: 12px; }
        #search { width: 100%; }
        .search-wrap { width: 100%; }
        .col-module, .col-prio, .col-status { display: none; }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <a class="back" href="/">&#8592; Back to CV</a>

      <!-- Header -->
      <section class="card">
        <h1>Pyavchik Time Machine &mdash; Test Cases</h1>
        <p class="subtitle">SlotsOne &mdash; Time Rewind Slot Game | v1.0 | Last updated: 2026-03-19</p>
        <div class="stats" id="stats-row">
          <!-- populated by JS -->
        </div>
      </section>

      <!-- Controls -->
      <section class="card">
        <div class="controls">
          <div class="filter-tabs" id="filter-tabs">
            <button class="tab active" data-module="ALL">All</button>
            <button class="tab" data-module="Core">Core</button>
            <button class="tab" data-module="Rewind">Rewind</button>
            <button class="tab" data-module="Math">Math</button>
            <button class="tab" data-module="UI">UI</button>
            <button class="tab" data-module="API">API</button>
            <button class="tab" data-module="NFR">NFR</button>
          </div>
          <div class="search-wrap">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
            <input id="search" type="text" placeholder="Search test cases…" autocomplete="off" />
          </div>
          <span class="count-label" id="count-label"></span>
        </div>
      </section>

      <!-- Table -->
      <section class="card" style="padding: 0 0 4px;">
        <table class="tc-table">
          <thead>
            <tr>
              <th style="width:120px">ID</th>
              <th class="col-module" style="width:80px">Module</th>
              <th>Title</th>
              <th class="col-prio" style="width:60px">Priority</th>
              <th class="col-status" style="width:80px">Status</th>
              <th style="width:30px"></th>
            </tr>
          </thead>
          <tbody id="tc-tbody">
            <!-- populated by JS -->
          </tbody>
        </table>
      </section>

      <!-- Legend -->
      <section class="card">
        <div class="legend">
          <span><span class="badge badge-core">CORE</span> Core Mechanics</span>
          <span><span class="badge badge-rewind">REWIND</span> Time Rewind</span>
          <span><span class="badge badge-math">MATH</span> Math Model</span>
          <span><span class="badge badge-ui">UI</span> User Interface</span>
          <span><span class="badge badge-api">API</span> API Endpoints</span>
          <span><span class="badge badge-nfr">NFR</span> Non-Functional</span>
          <span class="legend-sep"></span>
          <span class="prio prio-HIGH">HIGH</span>
          <span class="prio prio-MED">MED</span>
          <span class="prio prio-LOW">LOW</span>
          <span class="legend-sep"></span>
          <a href="/time-machine-requirements.html" target="_blank" rel="noreferrer" style="color:#62d7ff">Requirements</a>
        </div>
      </section>
    </main>

    <script>
      /* ─────────────────────────────────────────────────────────────────────
         TEST CASE DATA
         Fields: id, module, priority, title, preconditions,
                 steps (array), testData (string|null), expected
      ───────────────────────────────────────────────────────────────────── */
      const CASES = [

        /* ═══════════════════  Core — Core Mechanics  ══════════════════════ */
        {
          id: 'TC-TR-CORE-01', module: 'Core', priority: 'HIGH',
          title: 'Verify 5x3 reel grid displays 15 symbols across 15 paylines',
          preconditions: 'Game loaded. Session initialized via POST /game/init. Valid JWT.',
          steps: [
            'Send POST /api/v1/game/init with a valid Authorization header.',
            'Verify response contains config.reels = 5 and config.rows = 3.',
            'Verify config.paylines = 15.',
            'Perform a spin and inspect outcome.reel_matrix dimensions.',
            'Confirm reel_matrix is a 5-column by 3-row grid (15 total cells).'
          ],
          testData: 'config.reels = 5, config.rows = 3, config.paylines = 15',
          expected: 'Init response config shows reels=5, rows=3, paylines=15. Spin outcome reel_matrix is an array of 5 columns, each with 3 symbols. Total visible symbols = 15.'
        },
        {
          id: 'TC-TR-CORE-02', module: 'Core', priority: 'HIGH',
          title: 'Verify all 9 symbols render correctly on the reel grid',
          preconditions: 'Game loaded. Session initialized. Paytable accessible from config.',
          steps: [
            'Retrieve paytable from init response config.',
            'Verify paytable contains exactly 9 symbol entries.',
            'Confirm symbols: Gear, Hourglass, Clock, Compass, Crystal, Portal, TimeMachine, ChronoWild, VortexScatter.',
            'Perform 50 spins and collect all symbols that appear in reel_matrix.',
            'Verify all 9 symbol types appear at least once across the 50 spins.'
          ],
          testData: 'Expected symbols: [Gear, Hourglass, Clock, Compass, Crystal, Portal, TimeMachine, ChronoWild, VortexScatter]',
          expected: 'Paytable contains exactly 9 symbol definitions. After sufficient spins, all 9 symbol types appear in the reel_matrix. Each symbol renders without visual glitches on the PixiJS canvas.'
        },
        {
          id: 'TC-TR-CORE-03', module: 'Core', priority: 'HIGH',
          title: 'Verify Chrono Wild substitutes for all symbols except Vortex Scatter',
          preconditions: 'Game loaded. Active session with sufficient balance.',
          steps: [
            'Verify paytable defines ChronoWild with substitutes_all_except = ["VortexScatter"].',
            'Perform spins until a ChronoWild appears on a payline adjacent to paying symbols.',
            'Verify the win breakdown credits the ChronoWild as the substituted symbol.',
            'Verify that ChronoWild does NOT substitute for VortexScatter (free spin trigger requires actual scatter symbols).',
            'Confirm ChronoWild alone does not form its own winning combination.'
          ],
          testData: 'ChronoWild.substitutes_all_except = ["VortexScatter"]',
          expected: 'ChronoWild substitutes for any symbol on a payline except VortexScatter. Win breakdown includes ChronoWild as part of the matched combination. Scatter trigger count does not include ChronoWild.'
        },
        {
          id: 'TC-TR-CORE-04', module: 'Core', priority: 'HIGH',
          title: 'Verify Vortex Scatter free spins trigger (3=8, 4=12, 5=20)',
          preconditions: 'Game loaded. Active session with sufficient balance for many spins.',
          steps: [
            'Perform repeated spins until bonus_triggered is not null.',
            'When 3 VortexScatter symbols land, verify bonus_triggered.free_spins_count = 8.',
            'Continue spinning until 4 VortexScatter symbols land; verify free_spins_count = 12.',
            'Continue spinning until 5 VortexScatter symbols land; verify free_spins_count = 20.',
            'Verify scatter symbols are counted across all reels regardless of payline position.'
          ],
          testData: 'Scatter trigger map: {3: 8, 4: 12, 5: 20} free spins',
          expected: '3 scatters = 8 free spins, 4 scatters = 12 free spins, 5 scatters = 20 free spins. bonus_triggered.type = "free_spins". Scatters counted anywhere on the grid, not restricted to paylines.'
        },
        {
          id: 'TC-TR-CORE-05', module: 'Core', priority: 'HIGH',
          title: 'Verify paytable multipliers for 3/4/5 of a kind',
          preconditions: 'Game loaded. Paytable accessible from init config.',
          steps: [
            'Retrieve paytable from init response.',
            'For each symbol, verify multiplier values for 3, 4, and 5 of a kind.',
            'Verify low symbols (Gear, Hourglass, Clock): 3x=5-8, 4x=15-25, 5x=40-75.',
            'Verify mid symbols (Compass, Crystal): 3x=10-15, 4x=30-50, 5x=100-150.',
            'Verify high symbols (Portal, TimeMachine): 3x=20-25, 4x=75-100, 5x=250-500.',
            'Confirm multipliers are strictly increasing: 3-of-a-kind < 4-of-a-kind < 5-of-a-kind for every symbol.'
          ],
          testData: 'Paytable from config response. Low: Gear/Hourglass/Clock, Mid: Compass/Crystal, High: Portal/TimeMachine.',
          expected: 'All 7 paying symbols have defined multipliers for 3, 4, and 5 of a kind. Multipliers increase monotonically. Low < Mid < High tier ordering is maintained.'
        },
        {
          id: 'TC-TR-CORE-06', module: 'Core', priority: 'HIGH',
          title: 'Verify bet levels $0.15 to $150',
          preconditions: 'Game loaded. Init response available.',
          steps: [
            'Retrieve config.bet_levels from init response.',
            'Verify minimum bet = $0.15 (15 lines x $0.01 per line).',
            'Verify maximum bet = $150.00 (15 lines x $10.00 per line).',
            'Verify all intermediate bet levels are present and sorted ascending.',
            'Perform a spin with each bet level and confirm acceptance.'
          ],
          testData: 'config.bet_levels: min = 0.15, max = 150.00',
          expected: 'bet_levels array starts at 0.15, ends at 150.00. All bet levels are accepted by the spin endpoint. Array is sorted in ascending order with no duplicates.'
        },
        {
          id: 'TC-TR-CORE-07', module: 'Core', priority: 'HIGH',
          title: 'Verify min/max bet validation returns 400',
          preconditions: 'Game loaded. Active session.',
          steps: [
            'Send a spin request with bet.amount = 0.01 (below minimum 0.15).',
            'Verify HTTP 400 response with appropriate error code.',
            'Send a spin request with bet.amount = 200.00 (above maximum 150.00).',
            'Verify HTTP 400 response with appropriate error code.',
            'Verify balance is unchanged after both rejected requests.'
          ],
          testData: 'Below min: bet.amount = 0.01. Above max: bet.amount = 200.00. Valid range: 0.15-150.00.',
          expected: 'HTTP 400 for both requests. Error code indicates invalid bet amount. Balance remains unchanged. No spin is recorded in history.'
        },
        {
          id: 'TC-TR-CORE-08', module: 'Core', priority: 'HIGH',
          title: 'Verify left-to-right payline evaluation (longest match only)',
          preconditions: 'Game loaded. Active session with sufficient balance.',
          steps: [
            'Perform spins until a payline has 3-of-a-kind from the left.',
            'Verify win_breakdown shows the 3-of-a-kind payout for that payline.',
            'Perform spins until a payline has 4-of-a-kind from the left.',
            'Verify win_breakdown shows the 4-of-a-kind payout (not 3-of-a-kind + separate match).',
            'Verify no right-to-left matches are evaluated.',
            'Verify only the longest contiguous left-to-right match is paid per payline.'
          ],
          testData: null,
          expected: 'Paylines are evaluated left-to-right only. The longest contiguous match from reel 1 determines the payout. A 4-of-a-kind pays the 4x multiplier, not a 3x plus a separate match. No right-to-left evaluation occurs.'
        },
        {
          id: 'TC-TR-CORE-09', module: 'Core', priority: 'HIGH',
          title: 'Verify win calculation formula (bet_per_line x multiplier)',
          preconditions: 'Game loaded. Active session. Paytable known.',
          steps: [
            'Set bet.amount = 1.50 (15 lines x $0.10 per line).',
            'Perform a spin that results in a win.',
            'From win_breakdown, identify the symbol, match count, and payline.',
            'Look up the multiplier from the paytable for that symbol/match count.',
            'Calculate expected: bet_per_line ($0.10) x multiplier = expected_line_win.',
            'Verify the line win in win_breakdown matches the calculated value.',
            'Verify total win = sum of all line wins.'
          ],
          testData: 'bet.amount = 1.50, lines = 15, bet_per_line = 0.10',
          expected: 'Each line win = bet_per_line x paytable_multiplier for the matched symbol/count. Total win = sum of all winning paylines. Values match to 2 decimal places.'
        },
        {
          id: 'TC-TR-CORE-10', module: 'Core', priority: 'HIGH',
          title: 'Verify RNG independence (fresh seed per spin, Mulberry32)',
          preconditions: 'Game loaded. Provably fair seed pair active.',
          steps: [
            'Retrieve current seed pair via GET /game/provably-fair/current.',
            'Note the nonce value.',
            'Perform 3 consecutive spins.',
            'Retrieve the updated seed pair and verify nonce incremented by 3.',
            'Rotate the seed pair to reveal the server_seed.',
            'For each spin, compute HMAC-SHA256(server_seed, client_seed:nonce) and verify it produces the same reel_matrix.',
            'Verify each spin used a unique nonce (no nonce reuse).'
          ],
          testData: 'Seed derivation: HMAC-SHA256(server_seed, client_seed:nonce). RNG: Mulberry32.',
          expected: 'Each spin uses a unique nonce (incremented by 1). The derived seed produces a deterministic reel_matrix via Mulberry32 PRNG. No two spins share the same derived seed. Outcomes are independently verifiable.'
        },
        {
          id: 'TC-TR-CORE-11', module: 'Core', priority: 'LOW',
          title: 'Verify idle matrix is cosmetic (non-deterministic)',
          preconditions: 'Game loaded. Init response available.',
          steps: [
            'Call POST /game/init and record idle_matrix from the response.',
            'Call POST /game/init again (new session) and record the second idle_matrix.',
            'Compare the two idle matrices.',
            'Verify idle_matrix is 5x3 grid of valid symbols.',
            'Verify idle_matrix has no effect on the first spin outcome.'
          ],
          testData: null,
          expected: 'idle_matrix is a 5x3 grid of valid symbol IDs. Two consecutive init calls may produce different idle matrices (non-deterministic). The idle matrix is purely cosmetic and does not influence spin outcomes.'
        },
        {
          id: 'TC-TR-CORE-12', module: 'Core', priority: 'HIGH',
          title: 'Verify session init returns game config, balance, and idle matrix',
          preconditions: 'Valid JWT. Backend running.',
          steps: [
            'Send POST /api/v1/game/init with Authorization header.',
            'Verify response contains session_id (string).',
            'Verify response contains game_id = "time_machine".',
            'Verify config includes: reels=5, rows=3, paylines=15, bet_levels[], paytable.',
            'Verify balance contains amount (number) and currency ("USD").',
            'Verify idle_matrix is a 5x3 array of symbol identifiers.',
            'Verify expires_at is a valid ISO timestamp in the future.'
          ],
          testData: 'Authorization: Bearer <valid JWT>.',
          expected: 'HTTP 200. Body: { session_id, game_id: "time_machine", config: { reels: 5, rows: 3, paylines: 15, bet_levels, paytable }, balance: { amount, currency: "USD" }, idle_matrix: 5x3, expires_at }.'
        },
        {
          id: 'TC-TR-CORE-13', module: 'Core', priority: 'HIGH',
          title: 'Verify balance = previous - bet + winnings',
          preconditions: 'Game loaded. Active session. Balance known.',
          steps: [
            'Record balance_before from the most recent response.',
            'Send a spin with bet.amount = 1.50.',
            'Record win.amount and balance.amount from the spin response.',
            'Calculate expected_balance = balance_before - 1.50 + win.amount.',
            'Compare expected_balance with actual balance.amount.',
            'Repeat for 10 consecutive spins, checking each transition.'
          ],
          testData: 'bet.amount = 1.50, currency = "USD".',
          expected: 'For every spin: balance_after = balance_before - bet.amount + win.amount. Values match to 2 decimal places (tolerance: +/- 0.001). No rounding drift over 10 spins.'
        },
        {
          id: 'TC-TR-CORE-14', module: 'Core', priority: 'HIGH',
          title: 'Verify insufficient balance returns 400 INSUFFICIENT_BALANCE',
          preconditions: 'Active session. Balance below the requested bet amount.',
          steps: [
            'Drain the balance to near-zero by performing spins.',
            'Attempt a spin with bet.amount exceeding the remaining balance.',
            'Check the HTTP response status code and error code.',
            'Verify balance remains unchanged after the rejected spin.'
          ],
          testData: 'Remaining balance < bet.amount requested.',
          expected: 'HTTP 400. Body: { error: "Insufficient balance", code: "INSUFFICIENT_BALANCE" }. Balance unchanged. No spin recorded.'
        },

      /* ─────────────────────────────────────────────────────────────────────
         HELPERS
      ───────────────────────────────────────────────────────────────────── */
      function esc(str) {
        if (!str) return '';
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      const MODULE_BADGE = {
        Core:   'badge-core',
        Rewind: 'badge-rewind',
        Math:   'badge-math',
        UI:     'badge-ui',
        API:    'badge-api',
        NFR:    'badge-nfr',
      };
      const MODULE_LABEL = { Core: 'Core', Rewind: 'Rewind', Math: 'Math', UI: 'UI', API: 'API', NFR: 'NFR' };

      /* ─────────────────────────────────────────────────────────────────────
         STATS
      ───────────────────────────────────────────────────────────────────── */
      function renderStats() {
        const counts = { ALL: CASES.length, Core: 0, Rewind: 0, Math: 0, UI: 0, API: 0, NFR: 0 };
        CASES.forEach(c => counts[c.module]++);
        const labels = [
          ['ALL',    'Total'],
          ['Core',   'Core'],
          ['Rewind', 'Rewind'],
          ['Math',   'Math'],
          ['UI',     'UI'],
          ['API',    'API'],
          ['NFR',    'NFR'],
        ];
        document.getElementById('stats-row').innerHTML = labels.map(([key, label]) =>
          `<div class="stat"><strong>${counts[key]}</strong>${label}</div>`
        ).join('');
      }

      /* ─────────────────────────────────────────────────────────────────────
         RENDER TABLE
      ───────────────────────────────────────────────────────────────────── */
      let activeModule = 'ALL';
      let searchQuery  = '';

      function filteredCases() {
        const q = searchQuery.toLowerCase();
        return CASES.filter(c => {
          const matchModule = activeModule === 'ALL' || c.module === activeModule;
          const matchSearch = !q ||
            c.id.toLowerCase().includes(q) ||
            c.title.toLowerCase().includes(q) ||
            (c.testData || '').toLowerCase().includes(q) ||
            c.expected.toLowerCase().includes(q) ||
            c.preconditions.toLowerCase().includes(q);
          return matchModule && matchSearch;
        });
      }

      function renderTable() {
        const cases = filteredCases();
        const tbody = document.getElementById('tc-tbody');

        document.getElementById('count-label').textContent =
          cases.length === CASES.length
            ? `${CASES.length} test cases`
            : `${cases.length} of ${CASES.length} test cases`;

        if (cases.length === 0) {
          tbody.innerHTML = `<tr class="empty-row"><td colspan="6">No test cases match your filter.</td></tr>`;
          return;
        }

        tbody.innerHTML = cases.map(c => {
          const stepRows = c.steps.map((s, i) =>
            `<li><span class="step-num">${i + 1}</span><span>${esc(s)}</span></li>`
          ).join('');

          const testDataHtml = c.testData
            ? esc(c.testData).replace(/(&quot;[^&]*&quot;)/g, '<code>$1</code>')
            : '<span class="none">None — no specific input data required.</span>';

          return `
            <tr class="tc-row" data-id="${esc(c.id)}">
              <td class="tc-id">${esc(c.id)}</td>
              <td class="col-module"><span class="badge ${MODULE_BADGE[c.module]}">${MODULE_LABEL[c.module]}</span></td>
              <td class="tc-title">${esc(c.title)}</td>
              <td class="col-prio"><span class="prio prio-${c.priority}">${c.priority}</span></td>
              <td class="col-status"><span class="status-badge status-not-run">Not Run</span></td>
              <td><span class="tc-chevron">&#9654;</span></td>
            </tr>
            <tr class="tc-detail-row" data-for="${esc(c.id)}">
              <td colspan="6">
                <div class="tc-detail-panel" id="panel-${esc(c.id)}">
                  <div class="detail-grid">
                    <div class="detail-field full">
                      <span class="detail-label">Preconditions</span>
                      <div class="detail-value">${esc(c.preconditions)}</div>
                    </div>
                    <div class="detail-field">
                      <span class="detail-label">Test Data</span>
                      <div class="detail-value">${testDataHtml}</div>
                    </div>
                    <div class="detail-field">
                      <span class="detail-label">Expected Result</span>
                      <div class="detail-value">${esc(c.expected)}</div>
                    </div>
                    <div class="detail-field full">
                      <span class="detail-label">Test Steps</span>
                      <div class="detail-value">
                        <ol class="steps-list">${stepRows}</ol>
                      </div>
                    </div>
                    <div class="detail-field">
                      <span class="detail-label">Actual Result</span>
                      <div class="detail-value actual-placeholder">— (fill in during execution)</div>
                    </div>
                    <div class="detail-field">
                      <span class="detail-label">Status</span>
                      <div class="detail-value"><span class="status-badge status-not-run">Not Run</span></div>
                    </div>
                  </div>
                </div>
              </td>
            </tr>`;
        }).join('');

        /* re-attach row click handlers */
        tbody.querySelectorAll('.tc-row').forEach(row => {
          row.addEventListener('click', () => {
            const id = row.dataset.id;
            const panel = document.getElementById('panel-' + id);
            const isOpen = panel.classList.contains('open');
            panel.classList.toggle('open', !isOpen);
            row.classList.toggle('open', !isOpen);
          });
        });
      }

      /* ─────────────────────────────────────────────────────────────────────
         FILTER TABS
      ───────────────────────────────────────────────────────────────────── */
      document.getElementById('filter-tabs').addEventListener('click', e => {
        const btn = e.target.closest('.tab');
        if (!btn) return;
        activeModule = btn.dataset.module;
        document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t === btn));
        renderTable();
      });

      /* ─────────────────────────────────────────────────────────────────────
         SEARCH
      ───────────────────────────────────────────────────────────────────── */
      document.getElementById('search').addEventListener('input', e => {
        searchQuery = e.target.value;
        renderTable();
      });

      /* ─────────────────────────────────────────────────────────────────────
         INIT
      ───────────────────────────────────────────────────────────────────── */
      renderStats();
      renderTable();
    </script>
  </body>
</html>
