<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="rw-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2510"/>
      <stop offset="100%" stop-color="#1a1005"/>
    </linearGradient>
    <linearGradient id="rw-hat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B6914"/>
      <stop offset="100%" stop-color="#5C4410"/>
    </linearGradient>
  </defs>
  <rect width="120" height="120" rx="12" fill="url(#rw-bg)"/>
  <!-- Hat brim -->
  <ellipse cx="60" cy="42" rx="36" ry="8" fill="url(#rw-hat)" stroke="#D4A017" stroke-width="1.5"/>
  <!-- Hat crown -->
  <path d="M36 42 Q36 18 60 16 Q84 18 84 42" fill="url(#rw-hat)" stroke="#D4A017" stroke-width="1.5"/>
  <!-- Hat band -->
  <rect x="36" y="36" width="48" height="8" fill="#D4A017" opacity="0.7" rx="1"/>
  <!-- Face -->
  <ellipse cx="60" cy="62" rx="20" ry="22" fill="#D4975A"/>
  <!-- Eyes -->
  <ellipse cx="52" cy="58" rx="4" ry="3" fill="#1a1005"/>
  <ellipse cx="68" cy="58" rx="4" ry="3" fill="#1a1005"/>
  <!-- Smirk -->
  <path d="M52 70 Q60 76 68 70" fill="none" stroke="#1a1005" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Whip hint -->
  <path d="M28 85 Q40 78 52 90 Q60 96 70 88" fill="none" stroke="#D4A017" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Label -->
  <text x="60" y="112" text-anchor="middle" font-family="serif" font-size="11" font-weight="bold" fill="#FFD700">RICH WILDE</text>
</svg>
