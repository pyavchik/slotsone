<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="crystal-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2e1065"/>
      <stop offset="100%" stop-color="#1a0533"/>
    </linearGradient>
    <linearGradient id="crystal-body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="crystal-shine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ddd6fe" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="120" height="120" rx="12" fill="url(#crystal-bg)"/>
  <!-- Glow base -->
  <ellipse cx="60" cy="80" rx="20" ry="6" fill="#a78bfa" opacity="0.15"/>
  <!-- Main crystal -->
  <path d="M60 10 L44 40 L38 70 L52 85 L68 85 L82 70 L76 40 Z" fill="url(#crystal-body)" stroke="#c4b5fd" stroke-width="1"/>
  <!-- Crystal facets -->
  <path d="M60 10 L52 42 L60 80 Z" fill="url(#crystal-shine)"/>
  <path d="M60 10 L68 42 L60 80 Z" fill="#8b5cf6" opacity="0.4"/>
  <!-- Left facet edge -->
  <line x1="44" y1="40" x2="52" y2="85" stroke="#c4b5fd" stroke-width="0.5" opacity="0.6"/>
  <!-- Right facet edge -->
  <line x1="76" y1="40" x2="68" y2="85" stroke="#c4b5fd" stroke-width="0.5" opacity="0.6"/>
  <!-- Center line -->
  <line x1="60" y1="10" x2="60" y2="80" stroke="#ddd6fe" stroke-width="0.5" opacity="0.3"/>
  <!-- Sparkle highlights -->
  <circle cx="52" cy="30" r="2" fill="#ddd6fe" opacity="0.8"/>
  <circle cx="66" cy="50" r="1.5" fill="#ddd6fe" opacity="0.5"/>
  <circle cx="48" cy="55" r="1" fill="#ede9fe" opacity="0.6"/>
  <circle cx="70" cy="35" r="1" fill="#ede9fe" opacity="0.4"/>
  <!-- Outer glow -->
  <path d="M60 10 L44 40 L38 70 L52 85 L68 85 L82 70 L76 40 Z" fill="none" stroke="#a78bfa" stroke-width="2" opacity="0.2"/>
  <!-- Label -->
  <text x="60" y="100" text-anchor="middle" font-family="serif" font-size="13" font-weight="bold" fill="#a78bfa">CRYSTAL</text>
</svg>