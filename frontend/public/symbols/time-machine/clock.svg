<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="clock-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0c1929"/>
    </linearGradient>
    <radialGradient id="clock-face" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
  </defs>
  <rect width="120" height="120" rx="12" fill="url(#clock-bg)"/>
  <!-- Outer ring -->
  <circle cx="60" cy="48" r="34" fill="none" stroke="#60a5fa" stroke-width="2.5"/>
  <circle cx="60" cy="48" r="31" fill="url(#clock-face)" stroke="#3b82f6" stroke-width="1"/>
  <!-- Hour markers -->
  <line x1="60" y1="20" x2="60" y2="24" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
  <line x1="60" y1="72" x2="60" y2="76" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="48" x2="36" y2="48" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
  <line x1="84" y1="48" x2="88" y2="48" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
  <!-- Small markers -->
  <circle cx="74" cy="24" r="1.2" fill="#60a5fa" opacity="0.7"/>
  <circle cx="84" cy="34" r="1.2" fill="#60a5fa" opacity="0.7"/>
  <circle cx="84" cy="62" r="1.2" fill="#60a5fa" opacity="0.7"/>
  <circle cx="74" cy="72" r="1.2" fill="#60a5fa" opacity="0.7"/>
  <circle cx="46" cy="72" r="1.2" fill="#60a5fa" opacity="0.7"/>
  <circle cx="36" cy="62" r="1.2" fill="#60a5fa" opacity="0.7"/>
  <circle cx="36" cy="34" r="1.2" fill="#60a5fa" opacity="0.7"/>
  <circle cx="46" cy="24" r="1.2" fill="#60a5fa" opacity="0.7"/>
  <!-- Hour hand -->
  <line x1="60" y1="48" x2="60" y2="30" stroke="#93c5fd" stroke-width="3" stroke-linecap="round"/>
  <!-- Minute hand -->
  <line x1="60" y1="48" x2="76" y2="38" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
  <!-- Second hand -->
  <line x1="60" y1="48" x2="48" y2="64" stroke="#3b82f6" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <!-- Center dot -->
  <circle cx="60" cy="48" r="3" fill="#93c5fd"/>
  <circle cx="60" cy="48" r="1.5" fill="#60a5fa"/>
  <!-- Glow -->
  <circle cx="60" cy="48" r="34" fill="#60a5fa" opacity="0.05"/>
  <!-- Label -->
  <text x="60" y="100" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#60a5fa">CLOCK</text>
</svg>