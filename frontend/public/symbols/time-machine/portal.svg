      <stop offset="0%" stop-color="#4a1942"/>
      <stop offset="100%" stop-color="#1a0a1e"/>
    </linearGradient>
    <radialGradient id="portal-glow" cx="50%" cy="46%" r="40%">
      <stop offset="0%" stop-color="#fce7f3" stop-opacity="0.4"/>
      <stop offset="40%" stop-color="#f472b6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#831843" stop-opacity="0"/>
    </radialGradient>
  </defs>
