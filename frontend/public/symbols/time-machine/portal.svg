  <ellipse cx="60" cy="50" rx="9" ry="8" fill="none" stroke="#fbcfe8" stroke-width="2" opacity="0.85"/>
  <!-- Swirl arms -->
  <path d="M60 16 Q80 20 90 40 Q94 58 80 72" fill="none" stroke="#f472b6" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  <path d="M60 84 Q40 80 30 60 Q26 42 40 28" fill="none" stroke="#f472b6" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  <path d="M28 36 Q32 22 50 18" fill="none" stroke="#ec4899" stroke-width="1" opacity="0.3" stroke-linecap="round"/>
  <path d="M92 64 Q88 78 70 82" fill="none" stroke="#ec4899" stroke-width="1" opacity="0.3" stroke-linecap="round"/>
