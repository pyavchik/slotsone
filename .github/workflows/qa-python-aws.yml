name: qa-python-aws

on:
  pull_request:
    paths:
      - "qa-python/framework/aws/**"
      - "qa-python/tests/aws/**"
      - "qa-python/docker-compose.localstack.yml"
      - "qa-python/pyproject.toml"
      - ".github/workflows/qa-python-aws.yml"
  push:
    branches-ignore:
      - main
    paths:
      - "qa-python/framework/aws/**"
      - "qa-python/tests/aws/**"
      - "qa-python/docker-compose.localstack.yml"
      - "qa-python/pyproject.toml"
      - ".github/workflows/qa-python-aws.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  aws:
    name: AWS-integrated tests (boto3 + LocalStack)
    runs-on: ubuntu-latest
    services:
      localstack:
        image: localstack/localstack:3
        ports:
          - "4566:4566"
        env:
          SERVICES: s3,sqs,logs
          DEBUG: "0"
        options: >-
          --health-cmd "curl -sf http://localhost:4566/_localstack/health | grep -q '\"s3\": \"available\"'"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 30
          --health-start-period 10s
    env:
      AWS_ENDPOINT_URL: http://localhost:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: qa-python/pyproject.toml

      - name: Install qa-python deps
        working-directory: qa-python
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Wait for LocalStack to be fully ready
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:4566/_localstack/health \
               | python -c 'import sys,json; d=json.load(sys.stdin); sys.exit(0 if all(d["services"].get(s)=="available" for s in ("s3","sqs","logs")) else 1)'; then
              echo "localstack ready"; exit 0
            fi
            sleep 2
          done
          echo "localstack failed to become fully ready"
          curl -s http://localhost:4566/_localstack/health || true
          exit 1

      - name: Run AWS tests
        working-directory: qa-python
        run: pytest tests/aws -m aws -v --alluredir=allure-results

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-python-aws-allure-results
          path: qa-python/allure-results
          if-no-files-found: ignore
          retention-days: 14
