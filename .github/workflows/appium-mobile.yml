name: Appium Mobile Tests

on:
  schedule:
    # Weekday mornings at 08:00 UTC
    - cron: '0 8 * * 1-5'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mobile-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: appium/package-lock.json

      - name: Install dependencies
        working-directory: appium
        run: npm ci

      - name: Run BrowserStack tests
        working-directory: appium
        run: npm run test:browserstack
        env:
          BASE_URL: https://pyavchik.space
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}

      - name: Generate Allure report
        if: always()
        working-directory: appium
        run: npx allure generate allure-results --clean -o reports/allure-html

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-allure-report
          path: appium/reports/allure-html
          retention-days: 30

      - name: Upload raw results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-allure-results
          path: appium/allure-results
          retention-days: 14
